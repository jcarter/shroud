---
# auditd responds to SIGHUP for rule reload; a full restart is only needed
# when changing auditd.conf log settings.
- name: Reload auditd rules
  ansible.builtin.command: auditctl -R /etc/audit/rules.d/hardening.rules
  changed_when: true

- name: Restart auditd
  ansible.builtin.service:
    name: auditd
    state: restarted

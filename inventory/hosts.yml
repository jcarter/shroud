---
# First run: connect via the server's public IP or local hostname.
# After Tailscale is up, update ansible_host to the Tailscale IP or MagicDNS name.
all:
  hosts:
    debian:
      ansible_host: 1.2.3.4      # replace with server IP or hostname for first run
      ansible_user: deploy       # replace with your non-root sudo user
      ansible_become: true
      ansible_port: 22